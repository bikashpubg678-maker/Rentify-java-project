<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title} + ' — Rentify'">Rentify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <!-- KaTeX for LaTeX rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <!-- marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- DOMPurify for safe HTML -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
</head>

<body>
    <nav class="navbar">
    <a href="/" class="nav-logo">Rentify</a>
    <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">Menu</button>
    <div class="nav-links" id="navLinks">
                <a href="/" class="nav-link" th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI == '/' ? 'active' : ''}">Dashboard</a>
                <a href="/rent" class="nav-link" th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI == '/rent' ? 'active' : ''}">Rent a Car</a>
                <a href="/return" class="nav-link" th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI == '/return' ? 'active' : ''}">Return</a>
                <a href="/history" class="nav-link" th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI == '/history' ? 'active' : ''}">History</a>
                <a href="/charts" class="nav-link" th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI == '/charts' ? 'active' : ''}">Charts</a>
                <a href="/cars" class="nav-link" th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI == '/cars' ? 'active' : ''}">Manage</a>
                <a href="/customer" class="nav-link" th:classappend="${#httpServletRequest != null and (#httpServletRequest.requestURI == '/customer' or #httpServletRequest.requestURI == '/customer/profile' or #httpServletRequest.requestURI == '/customer/search') ? 'active' : ''}">Customers</a>
                <a href="/activity" class="nav-link" th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI == '/activity' ? 'active' : ''}">Activity</a>
                <a href="/about" class="nav-link" th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI == '/about' ? 'active' : ''}">About</a>
        <a href="#" class="nav-link" onclick="toggleChatbot(); return false;">AI Assistant</a>
        <button id="theme-toggle" class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">&#9681;</button>
    </div>
</nav>

    <main class="main-content">
        <div th:replace="${content}"><!-- page content --></div>
    </main>

    <footer class="footer">
        <p>Built by <strong>Bikash Talukder</strong> &nbsp;·&nbsp; Rentify v2.0 &nbsp;·&nbsp; Java + Spring Boot</p>
    </footer>
    <script th:src="@{/js/app.js}"></script>
    <!-- Floating Chat Toggle Button -->
    <button id="chatbot-toggle-btn" onclick="toggleChatbot()" aria-label="Open AI Assistant"></button>

    <!-- Chatbot Modal -->
    <div id="chatbot-modal" class="chatbot-modal">
        <!-- Header with gradient -->
        <div class="chatbot-header" onclick="toggleChatbot()">
            <div class="chatbot-header-left">
                <div>
                    <span class="chatbot-title">Rentify AI</span>
                    <span class="chatbot-status">● Online</span>
                </div>
            </div>
            <div style="display:flex;gap:6px;align-items:center">
                <button class="chatbot-maxbtn" onclick="event.stopPropagation(); toggleChatbotSize();" aria-label="Maximize">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <polyline points="9 21 3 21 3 15"></polyline>
                        <line x1="21" y1="3" x2="14" y2="10"></line>
                        <line x1="3" y1="21" x2="10" y2="14"></line>
                    </svg>
                </button>
                <button class="chatbot-close" onclick="event.stopPropagation(); toggleChatbot();">✕</button>
            </div>
        </div>

        <!-- Messages area -->
        <div id="chatbot-body" class="chatbot-body">
            <!-- Welcome message -->
            <div class="chatbot-welcome">
                <div class="welcome-text">
                    <strong>Welcome to Rentify AI!</strong>
                </div>
                <div class="welcome-hints">
                    <span class="hint-chip" onclick="quickAsk('What cars are available?')">Available Cars</span>
                    <span class="hint-chip" onclick="quickAsk('Show me the pricing')">Pricing</span>
                    <span class="hint-chip" onclick="quickAsk('What is the total revenue?')">Revenue</span>
                    <span class="hint-chip" onclick="quickAsk('How does ratings work?')">Ratings</span>
                </div>
            </div>
        </div>

        <!-- Input area -->
        <div class="chatbot-input-area">
            <input id="chatbot-input" type="text" placeholder="Ask anything about Rentify..."
                   onkeydown="if(event.key==='Enter') sendMessage();" />
            <button onclick="sendMessage()" id="chatbot-send-btn" aria-label="Send">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

</body>
</html>
