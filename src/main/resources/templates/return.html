<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Return a Car', ~{::content})}">
<body>
<div th:fragment="content">

    <div class="page-header">
        <h1 class="page-title">Return a Car</h1>
        <p class="page-sub">Select the car you want to return</p>
    </div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <!-- No rented cars -->
    <div th:if="${#lists.isEmpty(rentedCars)}" class="empty-state card">
        <div class="empty-icon"></div>
        <h3>No Cars Currently Rented</h3>
        <p>All cars are available. Rent one first!</p>
        <a href="/rent" class="btn btn-primary">Rent a Car</a>
    </div>

    <!-- Return form -->
    <div th:unless="${#lists.isEmpty(rentedCars)}" class="form-layout">
        <div class="card form-card">
            <form action="/return" method="post">

                <div class="field">
                    <label>Select Car to Return</label>
                    <div class="return-car-list">
                        <label th:each="rental : ${activeRentals}" class="return-car-option">
                            <input type="radio" name="carId" th:value="${rental.car.carId}" required/>
                            <div class="return-car-info">
                                <span class="return-car-name"
                                      th:text="${rental.car.brand} + ' ' + ${rental.car.model}">Toyota Camry</span>
                                <span class="return-car-meta"
                                      th:text="'Rented by ' + ${rental.customer.name} + ' · ' + ${rental.days} + ' days · $' + ${#numbers.formatDecimal(rental.totalPrice,1,2)}">
                                </span>
                                <span class="return-car-date"
                                      th:text="'Since: ' + ${rental.rentedAtStr}">Since: 01 Jan 2025</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn btn-primary btn-full">Confirm Return</button>
                    <a href="/" class="btn btn-secondary btn-full">Cancel</a>
                </div>

            </form>
        </div>
    </div>

</div>
</body>
</html>
