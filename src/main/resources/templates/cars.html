<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Manage Cars', ~{::content})}">
<body>
<div th:fragment="content">

    <div class="page-header">
        <h1 class="page-title">Manage Cars</h1>
        <p class="page-sub">Add new cars to the fleet or remove existing ones</p>
    </div>

    <!-- Alerts -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <div class="manage-layout">

        <!-- ── Add Car Form ───────────────────────────────────────────────── -->
        <div class="card">
            <h2 class="card-title">Add New Car</h2>

            <form action="/cars/add" method="post" style="margin-top:20px">

                <div class="field-row">
                    <div class="field">
                        <label>Car ID</label>
                        <input type="text" name="carId" placeholder="e.g. C007" required
                               pattern="[A-Za-z][0-9]{3}" title="Format: C001"/>
                    </div>
                    <div class="field">
                        <label>Category</label>
                        <select name="category" required>
                            <option value="">— Select —</option>
                            <option value="Sedan">Sedan</option>
                            <option value="SUV">SUV</option>
                            <option value="Sports">Sports</option>
                            <option value="Luxury">Luxury</option>
                            <option value="Hatchback">Hatchback</option>
                            <option value="Truck">Truck</option>
                        </select>
                    </div>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label>Brand</label>
                        <input type="text" name="brand" placeholder="e.g. Toyota" required/>
                    </div>
                    <div class="field">
                        <label>Model</label>
                        <input type="text" name="model" placeholder="e.g. Camry" required/>
                    </div>
                </div>

                <div class="field">
                    <label>Price per Day ($)</label>
                    <input type="number" name="price" min="1" step="0.01"
                           placeholder="e.g. 80" required/>
                </div>

                <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">
                    Add Car to Fleet
                </button>
            </form>
        </div>

        <!-- ── Current Fleet ─────────────────────────────────────────────── -->
        <div class="card">
            <h2 class="card-title">Current Fleet
                <span class="badge cat" th:text="${#lists.size(cars)} + ' cars'">6 cars</span>
            </h2>
            <div class="table-wrap" style="margin-top:16px">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Brand &amp; Model</th>
                            <th>Category</th>
                            <th>$/Day</th>
                            <th>Rating</th>
                            <th>Status</th>
                            <th>Delete</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="car : ${cars}">
                            <td class="mono" th:text="${car.carId}">C001</td>
                            <td th:text="${car.brand} + ' ' + ${car.model}">Toyota Camry</td>
                            <td><span class="badge cat" th:text="${car.category}">Sedan</span></td>
                            <td th:text="'$' + ${car.basePricePerDay}">$60</td>
                            <td>
                                <span th:if="${carRatings.containsKey(car.carId)}" class="stars-display"
                                      th:title="${carRatings.get(car.carId)} + ' / 5.0'">
                                    <span th:each="i : ${#numbers.sequence(1, 5)}">
                                        <span th:if="${i <= carRatings.get(car.carId)}" class="star filled">★</span>
                                        <span th:unless="${i <= carRatings.get(car.carId)}" class="star empty">★</span>
                                    </span>
                                    <span class="rating-num" th:text="${carRatings.get(car.carId)}"></span>
                                </span>
                                <span th:unless="${carRatings.containsKey(car.carId)}" class="hint-text">No ratings</span>
                            </td>
                            <td>
                                <span th:if="${car.available}"   class="badge available">✓ Available</span>
                                <span th:unless="${car.available}" class="badge rented">● Rented</span>
                            </td>
                            <td>
                                <form th:if="${car.available}" action="/cars/delete" method="post"
                                      onsubmit="return confirm('Delete this car permanently?')">
                                    <input type="hidden" name="carId" th:value="${car.carId}"/>
                                    <button type="submit" class="btn btn-danger btn-xs">Delete</button>
                                </form>
                                <span th:unless="${car.available}" class="hint-text">Rented — can't delete</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

</div>
</body>
</html>
